# Unbind the default prefix
unbind C-b

# Set the new prefix to Ctrl-s
set-option -g prefix C-s
bind-key C-s send-prefix

# Reload config (hard reload — clears leftover status-format slots so old
# multi-row layouts and stale plugin state don't survive)
bind r \
  set -gu status-format[1] \;\
  set -gu status-format[2] \;\
  set -gu status-format[3] \;\
  source-file ~/.tmux.conf \;\
  display "tmux.conf reloaded"

# Mouse support: click panes, drag to resize, scroll to enter copy mode
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Faster command sequences (no Esc delay in nvim)
set -s escape-time 0

# Vi-style copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Smart pane switching with awareness of Vim splits (vim-tmux-navigator).
# When the active pane is running vim/nvim, forward C-h/j/k/l to it;
# otherwise switch tmux panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
# When inside vim copy-mode, use the prefix version for tmux nav
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# More intuitive split bindings (keep current dir)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'samleeney/tmux-agent-status'
# Persist tmux layout across restarts: save windows/panes + working dirs,
# auto-save every 15min, auto-restore on tmux start.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'  # restore nvim sessions if you save them

# Initialize TMUX plugin manager (must run BEFORE our status overrides so
# plugin modifications to status-left/right/format get overwritten by us)
run '~/.tmux/plugins/tpm/tpm'

# ---- Status bar (kept after TPM so plugins can't override) ----
set -g status 1
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
# Clear any leftover multi-row format slots from prior reloads
set -gu status-format[1]
set -gu status-format[2]

# Layout: [session] on left, cc-statusline centered, HH:MM on right.
# cc-statusline lives in window-status-current-format because #() runs reliably
# there (it doesn't inside status-format[0] on tmux 3.6). status-justify centre
# then centers the "window list" region, effectively centering cc-statusline.
set -g status-justify centre
set -g status-left  '#[fg=green,bold][#S] '
set -g status-right '#[fg=white,bold]%H:%M '

# Hide the normal window list; repurpose the current-window slot for an
# OPTIONAL agent-harness statusline. scripts/tmux-agent.sh looks for the
# freshest ${TMPDIR}/agent-cache-*.out written by any of the per-agent
# scripts (claude-statusline.sh, codex-statusline.sh, ...) and emits it.
# If nothing is fresh, it exits silently — no errors, blank center region.
set -g window-status-format ''
set -g window-status-current-format '#[fg=black,bg=default]#(~/repos/tmux-config/scripts/tmux-agent.sh 2>/dev/null)'
set -g window-status-current-style 'default'
set -g window-status-separator ''